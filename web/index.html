<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eesti Scrabble</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/board.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!-- ===== LOBBY VIEW ===== -->
  <div id="lobby-view" class="view lobby">
    <div class="lobby__card">
      <h1 class="lobby__title">Eesti Scrabble</h1>
      <p class="lobby__subtitle">Mitme mängijaga sõnamäng</p>

      <div class="lobby__section">
        <label for="player-name" class="label">Sinu nimi</label>
        <input type="text" id="player-name" class="input" maxlength="20" placeholder="Sisesta oma nimi" autocomplete="off">
      </div>

      <div class="lobby__section">
        <button id="create-btn" class="btn btn--primary btn--full">Loo uus mäng</button>
      </div>

      <div class="lobby__divider">
        <span>või liitu olemasolevaga</span>
      </div>

      <div class="lobby__section">
        <label for="room-code-input" class="label">Toa kood</label>
        <input type="text" id="room-code-input" class="input input--code" maxlength="4" placeholder="ABCD" autocomplete="off">
      </div>

      <div class="lobby__section">
        <button id="join-btn" class="btn btn--primary btn--full">Liitu mänguga</button>
      </div>

      <p id="lobby-error" class="error-text" aria-live="polite"></p>
    </div>
  </div>

  <!-- ===== WAITING ROOM VIEW ===== -->
  <div id="waiting-view" class="view waiting hidden">
    <div class="waiting__card">
      <h2>Ootesaal</h2>
      <div class="waiting__code-row">
        <span class="label">Toa kood:</span>
        <span id="waiting-room-code" class="waiting__code"></span>
        <button id="copy-code-btn" class="btn btn--small">Kopeeri</button>
      </div>
      <h3>Mängijad</h3>
      <ul id="waiting-player-list" class="waiting__players"></ul>
      <button id="start-game-btn" class="btn btn--primary btn--full hidden" disabled>Alusta mängu</button>
    </div>
  </div>

  <!-- ===== GAME VIEW ===== -->
  <div id="game-view" class="view game hidden">
    <div class="game__layout">
      <!-- Left: scores -->
      <aside id="score-panel" class="panel score-panel"></aside>

      <!-- Center: board -->
      <main class="game__center">
        <div id="turn-indicator" class="turn-indicator"></div>
        <div id="board-container" class="board-container"></div>
        <div id="score-preview" class="score-preview"></div>
      </main>

      <!-- Right: game info + chat -->
      <aside id="game-info-panel" class="panel game-info-panel">
        <div id="tiles-remaining" class="tiles-remaining"></div>
        <h3 class="chat-heading">Vestlus</h3>
        <div id="chat-messages" class="chat-messages"></div>
        <div class="chat-input-row">
          <input type="text" id="chat-input" class="input chat-input" maxlength="200" placeholder="Kirjuta sõnum..." autocomplete="off">
          <button id="chat-send" class="btn btn--primary btn--small">Saada</button>
        </div>
      </aside>
    </div>

    <!-- Bottom bar: rack + controls -->
    <div class="game__bottom">
      <div id="rack-container" class="rack-container"></div>
      <div class="game__controls">
        <button id="submit-btn" class="btn btn--primary" disabled>Kinnita käik</button>
        <button id="pass-btn" class="btn btn--danger" disabled>Jäta vahele</button>
        <button id="exchange-btn" class="btn btn--secondary" disabled>Vaheta</button>
      </div>
    </div>

    <!-- Error toast -->
    <div id="error-toast" class="error-toast hidden" aria-live="assertive"></div>
  </div>

  <!-- ===== GAME OVER OVERLAY ===== -->
  <div id="game-over-overlay" class="game-over-overlay hidden">
    <div class="game-over-overlay__card">
      <div id="game-over-scores"></div>
      <div class="game-over-overlay__actions">
        <button id="play-again-btn" class="btn btn--primary">Mängi uuesti</button>
        <button id="leave-btn" class="btn btn--danger">Lahku</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
